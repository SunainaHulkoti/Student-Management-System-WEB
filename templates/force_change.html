{% extends "base.html" %}

{% block content %}

<h2>Change Your Password</h2>

<p>You must change your default password before continuing.</p>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST">
    <input name="password" type="password" class="form-control mb-2" placeholder="New Password" required>
    <button class="btn btn-danger">Update Password</button>
</form>

{% endblock %}
