<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Animate.css for animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        body {
            background: radial-gradient(circle at top left, rgba(102, 126, 234, 0.35), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(118, 75, 162, 0.35), transparent 28%),
                        linear-gradient(135deg, #0f172a 0%, #3b3f5c 40%, #5f698d 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.12), transparent 25%),
                        radial-gradient(circle at 85% 15%, rgba(255, 255, 255, 0.08), transparent 18%),
                        radial-gradient(circle at 50% 85%, rgba(59, 130, 246, 0.12), transparent 20%);
            pointer-events: none;
            animation: pulseBackground 10s ease-in-out infinite;
            z-index: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(15, 23, 42, 0.25);
            padding: 35px;
            margin: 50px auto;
            position: relative;
            z-index: 1;
            animation: slideInUp 0.9s ease-out;
        }

        .btn {
            transition: all 0.3s ease;
            border-radius: 25px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .table {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .table thead {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 1s ease-in;
        }

        .animate-bounce-in {
            animation: bounceIn 1s ease-in;
        }

        @keyframes pulseBackground {
            0%, 100% {
                transform: scale(1);
                opacity: 0.9;
            }
            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="container animate-fade-in">
    {% block content %}{% endblock %}
</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ Custom JS for interactions -->
<script>
    // Add tooltips to buttons
    document.querySelectorAll('.btn').forEach(btn => {
        if (btn.title) {
            new bootstrap.Tooltip(btn);
        }
    });
</script>

</body>
</html>
