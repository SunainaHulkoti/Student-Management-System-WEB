{% extends "base.html" %}

{% block content %}

<div class="text-center mb-4 animate-bounce-in">
    <h2>Welcome {{ user.name if user.role == 'user' else user.username }}</h2>
</div>

{% if user.role == "admin" %}
<div class="row">
    <div class="col-md-3 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title">➕ Add Student</h5>
                <a href="/add" class="btn btn-primary" title="Add a new student record">Go</a>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title">📋 View Students</h5>
                <a href="/view" class="btn btn-success" title="View all student records">Go</a>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title">🔍 Search</h5>
                <a href="/search" class="btn btn-info" title="Search for students">Go</a>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title">📊 Sort</h5>
                <a href="/sort" class="btn btn-secondary" title="Sort student records">Go</a>
            </div>
        </div>
    </div>
</div>
{% else %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4 mb-3">
        <div class="card text-center mx-auto">
            <div class="card-body">
                <h5 class="card-title">📄 My Report</h5>
                <a href="/report/{{ user.student_id }}" class="btn btn-primary" title="View your performance report">View Report</a>
            </div>
        </div>
    </div>
</div>
{% endif %}

<br>

<div class="text-center">
    <a href="/change_password" class="btn btn-warning me-2" title="Change your password">Change Password</a>
    <a href="/logout" class="btn btn-danger" title="Logout from the system">Logout</a>
</div>

{% endblock %}
